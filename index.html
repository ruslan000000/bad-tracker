<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0F1115">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta charset="UTF-8">
    <title>Fitness Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0F1115;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .start-screen {
            max-width: 600px;
            width: 100%;
            background: #151922;
            border-radius: 48px;
            padding: 60px 40px;
            text-align: center;
            border: 1px solid #252B36;
        }

        .hero-icon { font-size: 80px; margin-bottom: 24px; }
        .start-title {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #C7CDD8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }
        .start-sub { color: #C7CDD8; font-size: 1rem; margin-bottom: 48px; opacity: 0.7; }
        
        .start-buttons {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 40px;
        }
        
        .start-btn {
            padding: 20px 24px;
            border: none;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .start-btn.bads { background: #2A5F3A; color: white; }
        .start-btn.workouts { background: #1E3A5F; color: white; }
        .start-btn.instruction { background: #2A303E; color: #C7CDD8; border: 1px solid #3A4050; }
        .start-btn:active { transform: scale(0.97); }
        
        .contact-section { padding-top: 24px; border-top: 1px solid #252B36; }
        .contact-label { font-size: 0.75rem; color: #6E7683; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .contact-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #202531;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            color: #C7CDD8;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .version { font-size: 0.65rem; color: #4A505E; margin-top: 24px; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-card {
            background: #151922;
            width: 94%;
            max-width: 550px;
            border-radius: 44px;
            padding: 32px 28px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid #252B36;
        }
        .modal-card h2 { color: white; text-align: center; font-size: 1.8rem; margin-bottom: 28px; }
        .modal-card h3 { color: #7cb342; font-size: 1.3rem; margin: 20px 0 15px; }
        .modal-card p { color: #C7CDD8; font-size: 0.95rem; margin: 8px 0; line-height: 1.4; }
        .modal-card label { 
            color: white; 
            display: block; 
            margin: 18px 0 8px; 
            font-weight: 600;
            font-size: 1rem;
        }
        .modal-card input, .modal-card select { 
            width: 100%; 
            padding: 14px; 
            margin: 5px 0; 
            border: 1px solid #252B36; 
            border-radius: 32px; 
            background: #202531; 
            color: white; 
            font-size: 1rem;
        }
        .modal-card input::placeholder { color: #8A90A0; }
        
        .instruction-list {
            list-style: none;
            padding: 0;
        }
        .instruction-list li {
            color: #C7CDD8;
            padding: 10px 0;
            border-bottom: 1px solid #2A303E;
            font-size: 0.9rem;
        }
        .instruction-list li strong { color: #7cb342; }
        
        .app-container {
            max-width: 600px;
            width: 100%;
            background: #0F1115;
            border-radius: 40px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 85vh;
            border: 1px solid #252B36;
        }

        .section-header {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: #151922;
            border-bottom: 1px solid #252B36;
            gap: 8px;
            flex-wrap: wrap;
        }
        .back-btn {
            background: #202531;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: #C7CDD8;
            font-size: 1rem;
        }
        .section-title { font-size: 1.5rem; font-weight: 700; flex: 1; color: white; }
        .action-btn {
            background: #2A5F3A;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }
        .action-btn.orange { background: #ff9800; }
        .action-btn.blue { background: #1E3A5F; }
        .action-btn.green { background: #7cb342; }

        .section-content { flex: 1; overflow-y: auto; padding: 16px; }
        
        .supply-card, .workout-card {
            background: #202531;
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 12px;
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 10px; }
        .card-title { font-weight: 700; font-size: 1.1rem; color: white; }
        .supply-stock { color: #4CAF50; font-weight: 700; font-size: 1.1rem; }
        
        .workout-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 5px 0;
        }
        .workout-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }
        .collapse-icon {
            font-size: 1.2rem;
            color: #7cb342;
            cursor: pointer;
            user-select: none;
        }
        .exercises-container {
            margin-top: 12px;
            transition: all 0.2s ease;
        }
        .exercises-container.collapsed {
            display: none;
        }
        
        .exercise-item {
            background: #151922;
            border-radius: 20px;
            padding: 14px;
            margin-top: 12px;
        }
        .exercise-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .exercise-name { font-weight: 600; color: white; font-size: 1rem; }
        .sets-list { font-size: 0.8rem; color: #C7CDD8; margin-top: 6px; }
        
        .history-item {
            background: #202531;
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 10px;
        }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .history-name { color: white; font-weight: 600; font-size: 1rem; }
        .history-detail { font-size: 0.85rem; color: #C7CDD8; margin: 5px 0; }
        .history-date { font-size: 0.7rem; color: #6E7683; margin-top: 5px; }
        
        .add-btn {
            background: #2A5F3A;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-weight: 700;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .add-btn.blue { background: #1E3A5F; }
        .small-btn {
            background: #2A303E;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            cursor: pointer;
            color: #C7CDD8;
            margin-left: 8px;
            font-weight: 500;
        }
        .danger-btn { background: #3A1E1E; color: #E57373; }
        
        .filter-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-row input { flex: 1; padding: 14px; border: 1px solid #252B36; border-radius: 30px; background: #151922; color: white; font-size: 1rem; }
        .filter-row button { padding: 14px 20px; border-radius: 30px; border: none; background: #202531; color: #C7CDD8; cursor: pointer; font-size: 1rem; }
        
        .empty-state { text-align: center; padding: 50px; color: #6E7683; font-size: 1rem; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2A5F3A;
            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 0.9rem;
            z-index: 2000;
            animation: fadeOut 3s ease forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; bottom: 30px; }
            70% { opacity: 1; }
            100% { opacity: 0; bottom: 100px; visibility: hidden; }
        }
        
        .edit-icon, .delete-icon {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 25px;
        }
        .edit-icon { color: #7cb342; }
        .delete-icon { color: #E57373; }
        
        .set-row {
            display: flex;
            gap: 10px;
            margin: 12px 0;
            align-items: center;
        }
        .set-row input {
            flex: 1;
            padding: 14px;
            border: 1px solid #252B36;
            border-radius: 28px;
            background: #202531;
            color: white;
            font-size: 0.95rem;
        }
        .set-row input::placeholder { color: #8A90A0; }
        .remove-item {
            background: #3A1E1E;
            border: none;
            border-radius: 30px;
            padding: 10px 18px;
            cursor: pointer;
            color: #E57373;
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .group-item-selected {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2A5F3A;
            padding: 14px 16px;
            border-radius: 28px;
            margin-bottom: 10px;
            color: white;
            font-size: 1rem;
        }
        .group-item-available {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2A303E;
            padding: 14px 16px;
            border-radius: 28px;
            margin-bottom: 10px;
            color: white;
            font-size: 1rem;
        }
        .group-btn-add {
            background: #1E3A5F;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .group-btn-remove {
            background: #3A1E1E;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: #E57373;
            font-weight: 600;
            cursor: pointer;
        }
        
        .workout-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
        }
        
        .last-info {
            font-size: 0.75rem;
            color: #7cb342;
            margin-top: 4px;
        }
        .portion-info {
            font-size: 0.75rem;
            color: #A0A6B2;
            margin-top: 4px;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ========== ДАННЫЕ ==========
    let supplements = [];
    let historyLog = [];
    let workouts = [];
    let exerciseLibrary = [];
    let collapsedWorkouts = {};

    function getExercisePR(name) {
        let max = 0;
        workouts.forEach(w => {
            (w.exercises || []).forEach(ex => {
                if(ex.name === name) {
                    (ex.sets || []).forEach(s => {
                        if(s.weight > max) max = s.weight;
                    });
                }
            });
        });
        return max;
    }

    function vibrate() {
        if(navigator.vibrate) navigator.vibrate(40);
    }

    function checkPR(exName, sets) {
        let oldPR = getExercisePR(exName);
        let newPR = Math.max(...sets.map(s => s.weight || 0));
        if(newPR > oldPR && oldPR > 0) {
            showToast("🏆 Новый PR: " + newPR + " кг");
            vibrate();
        }
    }

    async function saveAll() {
        const state = {
            supplements,
            historyLog,
            workouts,
            exerciseLibrary,
            collapsedWorkouts
        };
        localStorage.setItem('fitness_supplements', JSON.stringify(supplements));
        localStorage.setItem('fitness_history', JSON.stringify(historyLog));
        localStorage.setItem('fitness_workouts', JSON.stringify(workouts));
        localStorage.setItem('fitness_exercise_library', JSON.stringify(exerciseLibrary));
        localStorage.setItem('fitness_collapsed', JSON.stringify(collapsedWorkouts));
        try {
            await saveToIndexedDB(state);
        } catch (e) {
            console.log("IndexedDB save error:", e);
        }
    }

    async function loadAll() {
        supplements = JSON.parse(localStorage.getItem('fitness_supplements') || '[]');
        historyLog = JSON.parse(localStorage.getItem('fitness_history') || '[]');
        workouts = JSON.parse(localStorage.getItem('fitness_workouts') || '[]');
        exerciseLibrary = JSON.parse(localStorage.getItem('fitness_exercise_library') || '[]');
        collapsedWorkouts = JSON.parse(localStorage.getItem('fitness_collapsed') || '{}');

        const isEmpty = supplements.length === 0 && workouts.length === 0 && historyLog.length === 0;
        if (isEmpty) {
            try {
                const dbData = await loadFromIndexedDB();
                if (dbData) {
                    supplements = dbData.supplements || [];
                    historyLog = dbData.historyLog || [];
                    workouts = dbData.workouts || [];
                    exerciseLibrary = dbData.exerciseLibrary || [];
                    collapsedWorkouts = dbData.collapsedWorkouts || {};
                }
            } catch (e) {}
        }

        const isFirstLaunch = localStorage.getItem('fitness_first_launch') === null;
        if (isFirstLaunch && exerciseLibrary.length === 0) {
            localStorage.setItem('fitness_first_launch', 'done');
            exerciseLibrary = [
                { id: 'ex1', name: 'Жим лёжа', muscleGroup: 'Грудь' },
                { id: 'ex2', name: 'Приседания', muscleGroup: 'Ноги' },
                { id: 'ex3', name: 'Тяга вертикальная', muscleGroup: 'Спина' }
            ];
            workouts = [{
                id: 'demo1',
                name: 'Первая тренировка',
                date: new Date().toISOString().slice(0, 10),
                exercises: []
            }];
            await saveAll();
        }
    }

    function showToast(msg) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    let currentModalCallback = null;
    let scrollPosition = 0;

    function showModal(html, onClose) {
        let modal = document.getElementById('dynamicModal');
        if(!modal) {
            modal = document.createElement('div');
            modal.id = 'dynamicModal';
            modal.className = 'modal';
            document.body.appendChild(modal);
        }
        modal.innerHTML = html;
        modal.style.display = 'flex';
        currentModalCallback = onClose || null;
        modal.onclick = (e) => { if(e.target === modal) closeModal(); };
    }

    function closeModal() {
        const modal = document.getElementById('dynamicModal');
        if(modal) modal.style.display = 'none';
        if(currentModalCallback) currentModalCallback();
        currentModalCallback = null;
        const content = document.querySelector('.section-content');
        if(content && scrollPosition) {
            content.scrollTop = scrollPosition;
            scrollPosition = 0;
        }
    }

    function saveScrollPosition() {
        const content = document.querySelector('.section-content');
        if(content) scrollPosition = content.scrollTop;
    }

    function getLastExerciseData(exerciseName) {
        const sortedWorkouts = [...workouts].sort((a, b) => new Date(b.date) - new Date(a.date));
        for (let workout of sortedWorkouts) {
            const exercise = workout.exercises.find(ex => ex.name === exerciseName);
            if (exercise && exercise.sets && exercise.sets.length > 0) {
                let bestSet = null;
                for (let set of exercise.sets) {
                    if (bestSet === null) bestSet = set;
                    else if (set.weight > bestSet.weight) bestSet = set;
                    else if (set.weight === bestSet.weight && set.reps > bestSet.reps) bestSet = set;
                }
                return { weight: bestSet.weight, reps: bestSet.reps };
            }
        }
        return null;
    }

    function showInstruction() {
        saveScrollPosition();
        showModal(`
            <div class="modal-card">
                <h2>📖 Инструкция</h2>
                <h3>💊 БАДы</h3>
                <ul class="instruction-list">
                    <li><strong>➕ Добавить БАД</strong> — указать название, единицу, количество и порцию (по умолчанию 1)</li>
                    <li><strong>✏️ Редактировать БАД</strong> — можно изменить порцию в любой момент</li>
                    <li><strong>💊 Приём БАДов</strong> — при добавлении автоматически подставляется порция, но её можно изменить</li>
                </ul>
                <h3>🏋️ Тренировки</h3>
                <ul class="instruction-list">
                    <li><strong>➕ Новая тренировка</strong> — кнопка в шапке</li>
                    <li><strong>▶️▼ Свернуть/развернуть</strong> — нажмите на иконку</li>
                    <li><strong>➕ Упражнение</strong> — сначала выберите группу мышц, затем упражнение</li>
                    <li><strong>📊 Последний вес</strong> — автоматически показывается при выборе упражнения</li>
                </ul>
                <p style="margin-top: 20px; text-align: center; color: #7cb342;">📬 Вопросы: <strong style="color:white;">@Rusrus4</strong></p>
                <button class="add-btn" onclick="closeModal()" style="margin-top: 20px;">Закрыть</button>
            </div>
        `);
    }

    function renderStartScreen() {
        document.getElementById('app').innerHTML = `
            <div class="start-screen">
                <div class="hero-icon">💪</div>
                <div class="start-title">Fitness Tracker</div>
                <div class="start-sub">Учёт БАДов и тренировок</div>
                <div class="start-buttons">
                    <button class="start-btn bads" onclick="showSection('bads')">💊 БАДы</button>
                    <button class="start-btn workouts" onclick="showSection('workouts')">🏋️ Тренировки</button>
                    <button class="start-btn instruction" onclick="showInstruction()">📖 Инструкция</button>
                </div>
                <div class="contact-section">
                    <div class="contact-label">📱 ПРЕДЛОЖЕНИЯ И ДОРАБОТКИ</div>
                    <a href="https://t.me/Rusrus4" target="_blank" class="contact-link">✈️ @Rusrus4 (Telegram)</a>
                </div>
                <div class="version">v3.5 — Порции БАДов</div>
            </div>
        `;
    }

    function showSection(section) {
        if(section === 'bads') renderBadsSection();
        else if(section === 'workouts') renderWorkoutsSection();
    }

    function goBack() { renderStartScreen(); }

    // ========== БЭКАП ==========
    function exportBackup() {
        try {
            const now = new Date();
            const backupData = {
                version: '3.5',
                date: now.toISOString(),
                supplements, historyLog, workouts, exerciseLibrary, collapsedWorkouts
            };
            const jsonStr = JSON.stringify(backupData, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const reader = new FileReader();
            reader.onload = function(event) {
                const link = document.createElement('a');
                link.href = event.target.result;
                link.download = `fitness_backup_${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}_${now.getHours().toString().padStart(2,'0')}-${now.getMinutes().toString().padStart(2,'0')}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast('📦 Бэкап сохранён!');
            };
            reader.readAsDataURL(blob);
        } catch(e) { alert('Ошибка бэкапа: ' + e.message); }
    }

    function importBackup() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.style.display = 'none';
        document.body.appendChild(input);
        input.onchange = (e) => {
            const file = e.target.files[0];
            if(!file) { document.body.removeChild(input); return; }
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (data.supplements !== undefined) supplements = data.supplements;
                    if (data.historyLog !== undefined) historyLog = data.historyLog;
                    if (data.workouts !== undefined) workouts = data.workouts;
                    if (data.exerciseLibrary !== undefined) exerciseLibrary = data.exerciseLibrary;
                    if (data.collapsedWorkouts !== undefined) collapsedWorkouts = data.collapsedWorkouts;
                    saveAll();
                    showToast('✅ Данные восстановлены!');
                    if (document.getElementById('badsContent')) renderBadsContent();
                    if (document.getElementById('workoutsContent')) renderWorkoutsContent();
                } catch(err) { alert('Ошибка: неверный формат файла'); }
                document.body.removeChild(input);
            };
            reader.readAsText(file, 'UTF-8');
        };
        input.click();
    }

    function exportToCSV(type, startDate, endDate) {
        let data = [];
        if(type === 'bads') {
            let entries = historyLog.filter(h => h.type === 'consume');
            if(startDate) entries = entries.filter(e => e.date.split('T')[0] >= startDate);
            if(endDate) entries = entries.filter(e => e.date.split('T')[0] <= endDate);
            data = entries.map(e => ({ 'Дата': new Date(e.date).toLocaleString(), 'БАД': e.suppName, 'Принято': e.amount, 'Единица': e.unit === 'г' ? 'граммы' : 'таблетки' }));
        } else {
            let filtered = [...workouts];
            if(startDate) filtered = filtered.filter(w => w.date >= startDate);
            if(endDate) filtered = filtered.filter(w => w.date <= endDate);
            for(let w of filtered) {
                for(let ex of (w.exercises || [])) {
                    for(let set of (ex.sets || [])) {
                        data.push({ 'Дата': w.date, 'Тренировка': w.name, 'Упражнение': ex.name, 'Группа мышц': ex.muscleGroup, 'Вес (кг)': set.weight, 'Повторы': set.reps });
                    }
                }
            }
        }
        if(!data.length) { alert("Нет данных"); return; }
        const headers = Object.keys(data[0]);
        const csvRows = [headers.join(',')];
        for(const row of data) {
            const values = headers.map(h => { let v = row[h] || ''; if(typeof v === 'string') v = v.replace(/"/g, '""'); return `"${v}"`; });
            csvRows.push(values.join(','));
        }
        const blob = new Blob(['\uFEFF' + csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${type}_${startDate || 'все'}_${endDate || 'все'}.csv`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        showToast('📊 CSV скачан!');
    }

    function updateHistoryEntry(entryId) {
        const entry = historyLog.find(h => h.id === entryId);
        if(!entry) return;
        const newAmount = parseFloat(document.getElementById('editHistoryAmount')?.value);
        const newDate = document.getElementById('editHistoryDate')?.value;
        if(isNaN(newAmount) || newAmount <= 0) return alert("Некорректное количество");
        const supp = supplements.find(s => s.id === entry.suppId);
        if(supp) {
            supp.quantity += entry.amount;
            if(supp.quantity < newAmount) {
                supp.quantity -= entry.amount;
                alert(`Недостаточно! Доступно: ${supp.quantity}`);
                return;
            }
            supp.quantity -= newAmount;
        }
        entry.amount = newAmount;
        entry.date = new Date(newDate).toISOString();
        saveAll(); closeModal(); renderBadsContent();
    }

        if(!confirm('Удалить запись?')) return;
        const entry = historyLog.find(h => h.id === entryId);
        if(entry) {
            const supp = supplements.find(s => s.id === entry.suppId);
            if(supp) supp.quantity += entry.amount;
            historyLog = historyLog.filter(h => h.id !== entryId);

    function addToGroup(id) {
        const supp = supplements.find(s => s.id === id);
        if(!supp) return;
        const defaultPortion = supp.portion || 1;
        let amount = prompt(`Сколько ${supp.name}? (${supp.unit === 'г' ? 'грамм' : 'таблеток'})\nОстаток: ${supp.quantity}\nПорция: ${defaultPortion}`, defaultPortion);
        amount = parseFloat(amount);
        if(isNaN(amount) || amount <= 0) return;
        if(supp.quantity < amount) { alert(`Недостаточно! Доступно: ${supp.quantity}`); return; }
        selectedBads.push({ ...supp, amount: amount });
        renderGroupConsumeModal();
    }

    function removeFromGroup(id) {
        selectedBads = selectedBads.filter(s => s.id !== id);
        renderGroupConsumeModal();
    }

    function saveGroupConsume() {
        if(selectedBads.length === 0) { alert("Добавьте хотя бы один БАД"); return; }
        const date = document.getElementById('groupConsumeDate')?.value;
        for(let item of selectedBads) {
            const supp = supplements.find(s => s.id === item.id);
            if(supp) {
                supp.quantity -= item.amount;
                historyLog.push({ id: Date.now().toString() + Math.random(), type: 'consume', suppId: supp.id, suppName: supp.name, amount: item.amount, unit: supp.unit, date: new Date(date).toISOString() });
            }
        }
        saveAll(); closeModal(); renderBadsContent();
        showToast(`✅ Записано ${selectedBads.length} БАДов`);
    }

        `);
    }

    function updateExerciseInLibrary(id) {
        const name = document.getElementById('editExName')?.value;
        const muscle = document.getElementById('editExMuscle')?.value;
        const ex = exerciseLibrary.find(e => e.id === id);
        if(ex && name && muscle) {
            ex.name = name; ex.muscleGroup = muscle;
            saveAll(); closeModal(); openExerciseLibrary();
        }
    }

    function deleteExerciseFromLibrary(id) {
        if(confirm('Удалить упражнение?')) {
            exerciseLibrary = exerciseLibrary.filter(e => e.id !== id);
            workouts.forEach(w => { w.exercises = w.exercises.filter(e => e.id !== id); });
            saveAll();
            openExerciseLibrary();
            renderWorkoutsContent();
        }
    }

    function openAddWorkoutModal() {
        saveScrollPosition();
        showModal(`
            <div class="modal-card">
                <h3>➕ Новая тренировка</h3>
                <label>Название:</label>
                <input type="text" id="workoutName" placeholder="Например: Силовая">
                <label>Дата:</label>
                <input type="date" id="workoutDate" value="${new Date().toISOString().slice(0,10)}">
                <div style="display:flex; gap:15px; margin-top:25px;">
                    <button class="small-btn" style="background:#1E3A5F; color:white; flex:1;" onclick="createWorkout()">Создать</button>
                    <button class="small-btn danger-btn" style="flex:1;" onclick="closeModal()">Отмена</button>
                </div>
            </div>
        `);
    }

    function createWorkout() {
        const name = document.getElementById('workoutName')?.value || 'Тренировка';
        const date = document.getElementById('workoutDate')?.value;
        workouts.push({ id: Date.now().toString(), name, date, exercises: [] });
        saveAll();
        closeModal();
        renderWorkoutsContent();
        showToast('✅ Тренировка создана');
    }

    function deleteWorkout(id) {
        if(confirm('Удалить тренировку?')) {
            workouts = workouts.filter(w => w.id !== id);
            saveAll();
            renderWorkoutsContent();
        }
    }

    function editWorkoutNameDate(id) {
        saveScrollPosition();
        const w = workouts.find(w => w.id === id);
        showModal(`
            <div class="modal-card">
                <h3>✏️ Редактировать</h3>
                <label>Название:</label>
                <input type="text" id="editWorkoutName" value="${escapeHtml(w.name)}">
                <label>Дата:</label>
                <input type="date" id="editWorkoutDate" value="${w.date}">
                <div style="display:flex; gap:15px; margin-top:25px;">
                    <button class="small-btn" style="background:#2A5F3A; color:white; flex:1;" onclick="updateWorkout('${id}')">Сохранить</button>
                    <button class="small-btn danger-btn" style="flex:1;" onclick="closeModal()">Отмена</button>
                </div>
            </div>
        `);
    }

    function updateWorkout(id) {
        const w = workouts.find(w => w.id === id);
        if(w) {
            w.name = document.getElementById('editWorkoutName')?.value || 'Тренировка';
            w.date = document.getElementById('editWorkoutDate')?.value;
            saveAll(); closeModal(); renderWorkoutsContent();
        }
    }

    let currentSets = [];
    let currentExerciseName = '';
    
    function addExerciseToWorkout(workoutId) {
        const muscleGroups = [...new Set(exerciseLibrary.map(ex => ex.muscleGroup))];
        let groupsHtml = muscleGroups.map(group => `<option value="${escapeHtml(group)}">${escapeHtml(group)}</option>`).join('');
        saveScrollPosition();
        showModal(`
            <div class="modal-card">
                <h3>🏋️ Добавить упражнение</h3>
                <label>1. Выберите группу мышц:</label>
                <select id="muscleGroupSelect" onchange="updateExerciseSelect()">
                    <option value="">-- Выберите группу --</option>
                    ${groupsHtml}
                </select>
                <label>2. Выберите упражнение:</label>
                <select id="exerciseSelect" onchange="onExerciseSelected()" disabled>
                    <option value="">-- Сначала выберите группу --</option>
                </select>
                <div id="lastInfo" class="last-info" style="display:none;"></div>
                <div id="setsContainer">
                    <div style="margin:15px 0 10px; color:white;">🏋️ Подходы:</div>
                    <div id="setsList"></div>
                    <button class="small-btn" onclick="addSetFieldWithCopy()">+ Добавить подход (копировать последний)</button>
                </div>
                <div style="display:flex; gap:15px; margin-top:25px;">
                    <button class="small-btn" style="background:#2A5F3A; color:white; flex:1;" onclick="saveExerciseToWorkout('${workoutId}')">Сохранить</button>
                    <button class="small-btn danger-btn" style="flex:1;" onclick="closeModal()">Отмена</button>
                </div>
            </div>
        `);
        currentSets = [];
        currentExerciseName = '';
        addSetField();
    }

    window.updateExerciseSelect = () => {
        const group = document.getElementById('muscleGroupSelect')?.value;
        const exerciseSelect = document.getElementById('exerciseSelect');
        if(!group) {
            exerciseSelect.innerHTML = '<option value="">-- Сначала выберите группу --</option>';
            exerciseSelect.disabled = true;
            return;
        }
        const exercises = exerciseLibrary.filter(ex => ex.muscleGroup === group);
        exerciseSelect.innerHTML = '<option value="">-- Выберите упражнение --</option>' + 
            exercises.map(ex => `<option value="${ex.id}" data-name="${escapeHtml(ex.name)}">${escapeHtml(ex.name)}</option>`).join('');
        exerciseSelect.disabled = false;
    };

    window.onExerciseSelected = () => {
        const select = document.getElementById('exerciseSelect');
        const selectedOption = select.options[select.selectedIndex];
        const exerciseName = selectedOption?.getAttribute('data-name');
        const lastInfoDiv = document.getElementById('lastInfo');
        if(exerciseName) {
            const lastData = getLastExerciseData(exerciseName);
            if(lastData) {
                lastInfoDiv.style.display = 'block';
                lastInfoDiv.innerHTML = `📊 Последний раз: ${lastData.weight} кг × ${lastData.reps}<br>🏆 PR: ${getExercisePR(exerciseName)} кг`;
                if(currentSets.length > 0 && currentSets[0].weight === '') {
                    currentSets[0].weight = lastData.weight;
                    currentSets[0].reps = lastData.reps;
                    renderSetsList();
                }
            } else {
                lastInfoDiv.style.display = 'none';
            }
            currentExerciseName = exerciseName;
        } else {
            lastInfoDiv.style.display = 'none';
        }
    };

    window.addSetFieldWithCopy = () => {
        let lastWeight = '', lastReps = '';
        if(currentSets.length > 0) {
            const last = currentSets[currentSets.length - 1];
            lastWeight = last.weight;
            lastReps = last.reps;
        }
        currentSets.push({ weight: lastWeight, reps: lastReps });
        renderSetsList();
    };

    window.addSetField = () => { currentSets.push({ weight: '', reps: '' }); renderSetsList(); };
    window.removeSetField = (idx) => { currentSets.splice(idx, 1); renderSetsList(); };
    
    function renderSetsList() {
        const container = document.getElementById('setsList');
        if(!container) return;
        container.innerHTML = currentSets.map((set, idx) => `
            <div class="set-row">
                <input type="number" placeholder="Вес (кг)" value="${set.weight}" onchange="currentSets[${idx}].weight = this.value">
                <input type="number" placeholder="Повторы" value="${set.reps}" onchange="currentSets[${idx}].reps = this.value">
                <button class="remove-item" onclick="removeSetField(${idx})">✖️</button>
            </div>
        `).join('');
    }

    function saveExerciseToWorkout(workoutId) {
        const exerciseSelect = document.getElementById('exerciseSelect');
        const selectedOption = exerciseSelect.options[exerciseSelect.selectedIndex];
        const exerciseName = selectedOption?.getAttribute('data-name');
        const exerciseId = exerciseSelect.value;
        if(!exerciseId || !exerciseName) { alert("Выберите упражнение"); return; }
        const ex = exerciseLibrary.find(e => e.id === exerciseId);
        if(!ex) return;
        const sets = currentSets.filter(s => s.weight && s.reps).map(s => ({ weight: parseFloat(s.weight), reps: parseInt(s.reps) }));
        if(sets.length === 0) return alert("Добавьте хотя бы один подход");
        const workout = workouts.find(w => w.id === workoutId);
        workout.exercises.push({ id: Date.now().toString(), name: ex.name, muscleGroup: ex.muscleGroup, sets });
        checkPR(ex.name, sets);
        saveAll();
        closeModal();
        renderWorkoutsContent();
        showToast(`✅ "${ex.name}" добавлено`);
    }

    function editExerciseInWorkout(workoutId, exerciseId) {
        saveScrollPosition();
        const workout = workouts.find(w => w.id === workoutId);
        const exercise = workout?.exercises.find(e => e.id === exerciseId);
        if(!exercise) return;
        currentSets = [...(exercise.sets || [])];
        showModal(`
            <div class="modal-card">
                <h3>✏️ Редактировать упражнение</h3>
                <div id="setsContainer">
                    <div style="margin:15px 0 10px; color:white;">🏋️ Подходы:</div>
                    <div id="setsList"></div>
                    <button class="small-btn" onclick="addSetFieldWithCopy()">+ Добавить подход (копировать последний)</button>
                </div>
                <div style="display:flex; gap:15px; margin-top:25px;">
                    <button class="small-btn" style="background:#2A5F3A; color:white; flex:1;" onclick="updateExerciseInWorkout('${workoutId}','${exerciseId}')">Сохранить</button>
                    <button class="small-btn danger-btn" style="flex:1;" onclick="closeModal()">Отмена</button>
                </div>
            </div>
        `);
        renderSetsList();
    }

    function updateExerciseInWorkout(workoutId, exerciseId) {
        const workout = workouts.find(w => w.id === workoutId);
        const exercise = workout?.exercises.find(e => e.id === exerciseId);
        if(exercise) {
            exercise.sets = currentSets.filter(s => s.weight && s.reps).map(s => ({ weight: parseFloat(s.weight), reps: parseInt(s.reps) }));
            saveAll();
            closeModal();
            renderWorkoutsContent();
            showToast('✅ Упражнение обновлено');
        }
    }

    function deleteExerciseFromWorkout(workoutId, exerciseId) {
        if(confirm('Удалить упражнение из тренировки?')) {
            const workout = workouts.find(w => w.id === workoutId);
            if(workout) {
                workout.exercises = workout.exercises.filter(e => e.id !== exerciseId);
                saveAll();
                renderWorkoutsContent();
                showToast('🗑️ Упражнение удалено');
            }
        }
    }

    // ========== INDEXEDDB ==========
    const DB_NAME = "fitness_db";
    const DB_STORE = "state";

    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(DB_STORE)) {
                    db.createObjectStore(DB_STORE);
                }
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function saveToIndexedDB(data) {
        const db = await openDB();
        const tx = db.transaction(DB_STORE, "readwrite");
        const store = tx.objectStore(DB_STORE);
        store.put(data, "app_state");
    }

    async function loadFromIndexedDB() {
        const db = await openDB();
        const tx = db.transaction(DB_STORE, "readonly");
        const store = tx.objectStore(DB_STORE);
        return new Promise((resolve) => {
            const req = store.get("app_state");
            req.onsuccess = () => resolve(req.result || null);
            req.onerror = () => resolve(null);
        });
    }

    loadAll().then(() => renderStartScreen());
</script>
</body>
</html>
