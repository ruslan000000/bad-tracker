<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Фитнес + БАД трекер</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #e9f0e6;
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .app {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            min-height: 85vh;
            display: flex;
            flex-direction: column;
        }
        
        .start-screen {
            padding: 40px 24px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        .start-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2c5e2e;
            margin-bottom: 8px;
        }
        .start-sub {
            color: #6c7a6c;
            margin-bottom: 48px;
            font-size: 0.9rem;
        }
        .start-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .start-btn {
            padding: 18px;
            border: none;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .start-btn.bads {
            background: #2e7d32;
            color: white;
        }
        .start-btn.workouts {
            background: #1565c0;
            color: white;
        }
        .start-btn:active {
            transform: scale(0.97);
        }
        
        .section-header {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: white;
            border-bottom: 1px solid #e0ecd6;
            gap: 12px;
        }
        .back-btn {
            background: #eef3ea;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
        }
        .section-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2c5e2e;
            flex: 1;
        }
        .section-title.blue {
            color: #1565c0;
        }
        .export-btn {
            background: #ff9800;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }
        
        .section-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .filter-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .filter-row input {
            flex: 1;
            padding: 10px;
            border: 1px solid #cddfc2;
            border-radius: 28px;
        }
        .filter-row button {
            padding: 10px 16px;
            border-radius: 28px;
            border: none;
            background: #eef3ea;
            font-weight: 500;
            cursor: pointer;
        }
        
        .supply-card {
            background: #f4f9ef;
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 12px;
            border-left: 5px solid #2e7d32;
        }
        .supply-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .supply-name {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .supply-stock {
            color: #2e7d32;
            font-weight: bold;
        }
        
        .workout-card {
            background: #f4f9ef;
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 12px;
            border-left: 5px solid #1565c0;
        }
        .workout-date {
            font-weight: bold;
            font-size: 1rem;
            color: #1565c0;
            margin-bottom: 8px;
        }
        .exercise-item {
            background: white;
            border-radius: 14px;
            padding: 10px;
            margin-top: 8px;
        }
        .exercise-name {
            font-weight: 600;
        }
        .sets-list {
            font-size: 0.8rem;
            color: #5a6e5a;
            margin-top: 6px;
        }
        
        .history-item {
            background: #fefef7;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
            border-left: 4px solid #bdccae;
        }
        .history-name {
            font-weight: 700;
        }
        .history-detail {
            font-size: 0.85rem;
            color: #3b553b;
        }
        .history-date {
            font-size: 0.7rem;
            color: #8e9e8e;
        }
        
        .add-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 600;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
        }
        .add-btn.blue {
            background: #1565c0;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-card {
            background: white;
            width: 92%;
            max-width: 380px;
            border-radius: 32px;
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-card h3 {
            text-align: center;
            margin-top: 0;
        }
        .modal-card input, .modal-card select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #cddfc2;
            border-radius: 28px;
        }
        .set-row {
            display: flex;
            gap: 8px;
            margin: 8px 0;
            align-items: center;
        }
        .set-row input {
            flex: 1;
            margin: 0;
        }
        .remove-set {
            background: #f3dfdf;
            border: none;
            border-radius: 20px;
            padding: 8px 12px;
            cursor: pointer;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .small-btn {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-weight: 500;
            cursor: pointer;
        }
        .danger-btn {
            background: #f3dfdf;
            color: #a14343;
        }
        .confirm-btn {
            background: #2e7d32;
            color: white;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #98a898;
        }
        .delete-workout, .delete-supp {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #bc8f8f;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <div id="startScreen" class="start-screen">
        <div class="logo">💪🧠</div>
        <div class="start-title">Фитнес трекер</div>
        <div class="start-sub">Учитывай БАДы и тренировки в одном месте</div>
        <div class="start-buttons">
            <button class="start-btn bads" onclick="showSection('bads')">💊 БАДы</button>
            <button class="start-btn workouts" onclick="showSection('workouts')">🏋️ Тренировки</button>
        </div>
    </div>

    <div id="badsSection" style="display: none; flex-direction: column; height: 100%;">
        <div class="section-header">
            <button class="back-btn" onclick="showStart()">← Назад</button>
            <div class="section-title">💊 БАДы</div>
            <button class="export-btn" onclick="openExportModal('bads')">📎 Export</button>
        </div>
        <div class="section-content" id="badsContent"></div>
    </div>

    <div id="workoutsSection" style="display: none; flex-direction: column; height: 100%;">
        <div class="section-header">
            <button class="back-btn" onclick="showStart()">← Назад</button>
            <div class="section-title blue">🏋️ Тренировки</div>
            <button class="export-btn" onclick="openExportModal('workouts')">📎 Export</button>
        </div>
        <div class="section-content" id="workoutsContent"></div>
    </div>
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script>
    // === ДАННЫЕ ===
    let supplements = [];
    let historyLog = [];
    let workouts = [];
    let exerciseLibrary = [];

    function saveAll() {
        localStorage.setItem('tracker_supplements', JSON.stringify(supplements));
        localStorage.setItem('tracker_history', JSON.stringify(historyLog));
        localStorage.setItem('tracker_workouts', JSON.stringify(workouts));
        localStorage.setItem('tracker_exercise_library', JSON.stringify(exerciseLibrary));
    }

    function loadAll() {
        supplements = JSON.parse(localStorage.getItem('tracker_supplements') || '[]');
        historyLog = JSON.parse(localStorage.getItem('tracker_history') || '[]');
        workouts = JSON.parse(localStorage.getItem('tracker_workouts') || '[]');
        exerciseLibrary = JSON.parse(localStorage.getItem('tracker_exercise_library') || '[]');
        
        if(exerciseLibrary.length === 0) {
            exerciseLibrary = [
                { id: 'ex1', name: 'Жим лёжа', muscleGroup: 'Грудь' },
                { id: 'ex2', name: 'Приседания', muscleGroup: 'Ноги' },
                { id: 'ex3', name: 'Тяга вертикальная', muscleGroup: 'Спина' }
            ];
            saveAll();
        }
    }

    function showStart() {
        document.getElementById('startScreen').style.display = 'flex';
        document.getElementById('badsSection').style.display = 'none';
        document.getElementById('workoutsSection').style.display = 'none';
    }

    function showSection(section) {
        document.getElementById('startScreen').style.display = 'none';
        if(section === 'bads') {
            document.getElementById('badsSection').style.display = 'flex';
            renderBads();
        } else if(section === 'workouts') {
            document.getElementById('workoutsSection').style.display = 'flex';
            renderWorkouts();
        }
    }

    // === БАДЫ (полная версия) ===
    function renderBads() {
        const container = document.getElementById('badsContent');
        
        let supplementsHtml = supplements.map(sup => `
            <div class="supply-card">
                <div class="supply-header">
                    <span class="supply-name">${escapeHtml(sup.name)}</span>
                    <div>
                        <span class="supply-stock">${sup.quantity} ${sup.unit === 'г' ? 'г' : 'таб'}</span>
                        <button class="delete-supp" onclick="deleteSupplement('${sup.id}')">🗑️</button>
                    </div>
                </div>
                <div style="font-size:0.7rem; color:#6c7a6c;">${sup.unit === 'г' ? 'граммы' : 'таблетки'}</div>
            </div>
        `).join('');
        
        let historyHtml = historyLog.filter(h => h.type === 'consume').map(h => `
            <div class="history-item">
                <div class="history-name">${escapeHtml(h.suppName)}</div>
                <div class="history-detail">💊 Принято: ${h.amount} ${h.unit === 'г' ? 'г' : 'таб'}</div>
                <div class="history-date">📅 ${new Date(h.date).toLocaleString()}</div>
            </div>
        `).join('');
        
        container.innerHTML = `
            <div class="filter-row">
                <input type="date" id="badsFilterDate" placeholder="Фильтр по дате">
                <button onclick="filterBadsHistory()">🔍 Показать</button>
                <button onclick="clearBadsFilter()">✖️ Сброс</button>
            </div>
            <div style="margin-bottom: 20px;">
                <div style="font-weight: bold; margin-bottom: 8px;">📦 Мои БАДы</div>
                ${supplementsHtml || '<div class="empty-state">Нет БАДов</div>'}
                <button class="add-btn" onclick="openAddSuppModal()">➕ Добавить БАД</button>
                <button class="add-btn" style="background:#ff9800;" onclick="openConsumeModal()">💊 Принять БАД</button>
            </div>
            <div>
                <div style="font-weight: bold; margin-bottom: 8px;">📜 История приёмов</div>
                <div id="historyList">${historyHtml || '<div class="empty-state">Нет записей</div>'}</div>
            </div>
        `;
    }

    function deleteSupplement(id) {
        if(confirm('Удалить БАД и все записи о нём?')) {
            historyLog = historyLog.filter(h => h.suppId !== id);
            supplements = supplements.filter(s => s.id !== id);
            saveAll();
            renderBads();
        }
    }

    function openAddSuppModal() {
        let modalHtml = `
            <div class="modal-card">
                <h3>✨ Добавить БАД</h3>
                <input type="text" id="suppName" placeholder="Название">
                <select id="suppUnit">
                    <option value="г">граммы (г)</option>
                    <option value="таб">таблетки (шт)</option>
                </select>
                <input type="number" id="suppAmount" placeholder="Количество">
                <div class="modal-buttons">
                    <button class="small-btn confirm-btn" onclick="addSupplement()">Добавить</button>
                    <button class="small-btn danger-btn" onclick="closeModal()">Отмена</button>
                </div>
            </div>
        `;
        showModal(modalHtml);
    }

    function addSupplement() {
        const name = document.getElementById('suppName').value;
        const unit = document.getElementById('suppUnit').value;
        const amount = parseFloat(document.getElementById('suppAmount').value);
        if(!name || isNaN(amount) || amount <= 0) { alert("Заполните правильно"); return; }
        
        let existing = supplements.find(s => s.name === name && s.unit === unit);
        if(existing) {
            existing.quantity += amount;
        } else {
            supplements.push({ id: Date.now().toString(), name, unit, quantity: amount });
        }
        saveAll();
        closeModal();
        renderBads();
    }

    function openConsumeModal() {
        let suppOptions = supplements.map(s => `<option value="${s.id}">${s.name} (${s.quantity} ${s.unit})</option>`).join('');
        let modalHtml = `
            <div class="modal-card">
                <h3>💊 Принять БАД</h3>
                <select id="consumeSuppId">${suppOptions}</select>
                <input type="number" id="consumeAmount" placeholder="Количество">
                <input type="datetime-local" id="consumeDate" value="${new Date().toISOString().slice(0,16)}">
                <div class="modal-buttons">
                    <button class="small-btn confirm-btn" onclick="consumeSupp()">Записать</button>
                    <button class="small-btn danger-btn" onclick="closeModal()">Отмена</button>
                </div>
            </div>
        `;
        showModal(modalHtml);
    }

    function consumeSupp() {
        const suppId = document.getElementById('consumeSuppId').value;
        const amount = parseFloat(document.getElementById('consumeAmount').value);
        const date = document.getElementById('consumeDate').value;
        const supp = supplements.find(s => s.id === suppId);
        if(!supp || isNaN(amount) || amount <= 0) { alert("Ошибка"); return; }
        if(supp.quantity < amount) { alert("Недостаточно"); return; }
        
        supp.quantity -= amount;
        historyLog.push({
            id: Date.now().toString(),
            type: 'consume',
            suppId: supp.id,
            suppName: supp.name,
            amount: amount,
            unit: supp.unit,
            date: new Date(date).toISOString()
        });
        saveAll();
        closeModal();
        renderBads();
    }

    function filterBadsHistory() {
        const filterDate = document.getElementById('badsFilterDate').value;
        const historyDiv = document.getElementById('historyList');
        let filtered = historyLog.filter(h => h.type === 'consume');
        if(filterDate) {
            filtered = filtered.filter(h => h.date.split('T')[0] === filterDate);
        }
        historyDiv.innerHTML = filtered.map(h => `
            <div class="history-item">
                <div class="history-name">${escapeHtml(h.suppName)}</div>
                <div class="history-detail">💊 Принято: ${h.amount} ${h.unit === 'г' ? 'г' : 'таб'}</div>
                <div class="history-date">📅 ${new Date(h.date).toLocaleString()}</div>
            </div>
        `).join('') || '<div class="empty-state">Нет записей</div>';
    }
    
    function clearBadsFilter() {
        document.getElementById('badsFilterDate').value = '';
        filterBadsHistory();
    }

    // === ТРЕНИРОВКИ ===
    function renderWorkouts() {
        const container = document.getElementById('workoutsContent');
        if(!workouts.length) {
            container.innerHTML = `<div class="empty-state">🏋️ Нет тренировок</div><button class="add-btn blue" onclick="openAddWorkoutModal()">➕ Новая тренировка</button>`;
            return;
        }
        const sorted = [...workouts].sort((a,b) => new Date(b.date) - new Date(a.date));
        container.innerHTML = sorted.map(w => `
            <div class="workout-card">
                <div style="display: flex; justify-content: space-between;">
                    <div class="workout-date">📅 ${new Date(w.date).toLocaleDateString('ru-RU')}</div>
                    <button class="delete-workout" onclick="deleteWorkout('${w.id}')">🗑️</button>
                </div>
                ${w.exercises.map(ex => `
                    <div class="exercise-item">
                        <div class="exercise-name">💪 ${escapeHtml(ex.name)} <span style="font-size:0.7rem;">(${ex.muscleGroup})</span></div>
                        <div class="sets-list">${ex.sets.map((s,i)=>`${i+1} подход: ${s.weight}кг × ${s.reps} повт`).join(' · ')}</div>
                    </div>
                `).join('')}
                <button class="small-btn" style="background:#1565c0; color:white; margin-top:8px;" onclick="addExerciseToWorkout('${w.id}')">➕ Упражнение</button>
            </div>
        `).join('');
        container.innerHTML += `<button class="add-btn blue" style="margin-top:12px;" onclick="openAddWorkoutModal()">➕ Новая тренировка</button>`;
    }

    function openAddWorkoutModal() {
        let modalHtml = `
            <div class="modal-card">
                <h3>📅 Новая тренировка</h3>
                <input type="date" id="newWorkoutDate" value="${new Date().toISOString().slice(0,10)}">
                <div class="modal-buttons">
                    <button class="small-btn confirm-btn" onclick="createEmptyWorkout()">Создать</button>
                    <button class="small-btn danger-btn" onclick="closeModal()">Отмена</button>
                </div>
            </div>
        `;
        showModal(modalHtml);
    }

    function createEmptyWorkout() {
        const date = document.getElementById('newWorkoutDate').value;
        workouts.push({ id: Date.now().toString(), date, exercises: [] });
        saveAll();
        closeModal();
        renderWorkouts();
    }

    function deleteWorkout(id) {
        if(confirm('Удалить тренировку?')) {
            workouts = workouts.filter(w => w.id !== id);
            saveAll();
            renderWorkouts();
        }
    }

    function addExerciseToWorkout(workoutId) {
        const workout = workouts.find(w => w.id === workoutId);
        let options = exerciseLibrary.map(ex => `<option value="${ex.id}" data-muscle="${ex.muscleGroup}">${ex.name} (${ex.muscleGroup})</option>`).join('');
        options += `<option value="new">➕ Новое упражнение...</option>`;
        
        let modalHtml = `
            <div class="modal-card">
                <h3>🏋️ Добавить упражнение</h3>
                <select id="exSelect" onchange="toggleNewExercise()">
                    ${options}
                </select>
                <div id="newExerciseFields" style="display:none;">
                    <input type="text" id="newExName" placeholder="Название упражнения">
                    <input type="text" id="newExMuscle" placeholder="Группа мышц">
                </div>
                <div id="setsContainer">
                    <div style="font-weight:bold; margin-top:8px;">Подходы:</div>
                    <div id="setsList"></div>
                    <button class="small-btn" onclick="addSetField()">+ Добавить подход</button>
                </div>
                <div class="modal-buttons">
                    <button class="small-btn confirm-btn" onclick="saveExerciseToWorkout('${workoutId}')">Сохранить</button>
                    <button class="small-btn danger-btn" onclick="closeModal()">Отмена</button>
                </div>
            </div>
        `;
        showModal(modalHtml);
        window.currentSets = [];
        addSetField();
    }

    window.addSetField = function() {
        window.currentSets.push({ weight: '', reps: '' });
        renderSetsList();
    };
    
    window.removeSetField = function(idx) {
        window.currentSets.splice(idx, 1);
        renderSetsList();
    };
    
    function renderSetsList() {
        const container = document.getElementById('setsList');
        if(!container) return;
        container.innerHTML = window.currentSets.map((set, idx) => `
            <div class="set-row">
                <input type="number" placeholder="Вес (кг)" value="${set.weight}" onchange="window.currentSets[${idx}].weight = this.value">
                <input type="number" placeholder="Повторы" value="${set.reps}" onchange="window.currentSets[${idx}].reps = this.value">
                <button class="remove-set" onclick="removeSetField(${idx})">✖️</button>
            </div>
        `).join('');
    }
    
    window.toggleNewExercise = function() {
        const val = document.getElementById('exSelect').value;
        const newFields = document.getElementById('newExerciseFields');
        newFields.style.display = val === 'new' ? 'block' : 'none';
    };
    
    function saveExerciseToWorkout(workoutId) {
        const select = document.getElementById('exSelect');
        let name, muscleGroup;
        if(select.value === 'new') {
            name = document.getElementById('newExName').value;
            muscleGroup = document.getElementById('newExMuscle').value;
            if(!name || !muscleGroup) { alert("Заполните название и группу мышц"); return; }
            exerciseLibrary.push({ id: Date.now().toString(), name, muscleGroup });
            saveAll();
        } else {
            const ex = exerciseLibrary.find(e => e.id === select.value);
            name = ex.name;
            muscleGroup = ex.muscleGroup;
        }
        
        const sets = window.currentSets.filter(s => s.weight && s.reps).map(s => ({ weight: parseFloat(s.weight), reps: parseInt(s.reps) }));
        if(sets.length === 0) { alert("Добавьте хотя бы один подход"); return; }
        
        const workout = workouts.find(w => w.id === workoutId);
        workout.exercises.push({
            id: Date.now().toString(),
            name: name,
            muscleGroup: muscleGroup,
            sets: sets
        });
        saveAll();
        closeModal();
        renderWorkouts();
    }

    // === ЭКСПОРТ В EXCEL ===
    let currentExportType = '';
    function openExportModal(type) {
        currentExportType = type;
        let modalHtml = `
            <div class="modal-card">
                <h3>📎 Выгрузка в Excel</h3>
                <label>С даты:</label>
                <input type="date" id="exportStartDate">
                <label>По дату:</label>
                <input type="date" id="exportEndDate">
                <div class="modal-buttons">
                    <button class="small-btn confirm-btn" onclick="exportToExcel()">Выгрузить</button>
                    <button class="small-btn danger-btn" onclick="closeModal()">Отмена</button>
                </div>
            </div>
        `;
        showModal(modalHtml);
    }
    
    function exportToExcel() {
        const startDate = document.getElementById('exportStartDate').value;
        const endDate = document.getElementById('exportEndDate').value;
        
        let data = [];
        if(currentExportType === 'bads') {
            let entries = historyLog.filter(h => h.type === 'consume');
            if(startDate) entries = entries.filter(e => e.date.split('T')[0] >= startDate);
            if(endDate) entries = entries.filter(e => e.date.split('T')[0] <= endDate);
            data = entries.map(e => ({
                'Дата': new Date(e.date).toLocaleString(),
                'БАД': e.suppName,
                'Принято': e.amount,
                'Единица': e.unit === 'г' ? 'граммы' : 'таблетки'
            }));
        } else if(currentExportType === 'workouts') {
            let filtered = [...workouts];
            if(startDate) filtered = filtered.filter(w => w.date >= startDate);
            if(endDate) filtered = filtered.filter(w => w.date <= endDate);
            for(let w of filtered) {
                for(let ex of w.exercises) {
                    for(let set of ex.sets) {
                        data.push({
                            'Дата': w.date,
                            'Упражнение': ex.name,
                            'Группа мышц': ex.muscleGroup,
                            'Вес (кг)': set.weight,
                            'Повторы': set.reps
                        });
                    }
                }
            }
        }
        
        if(data.length === 0) {
            alert("Нет данных за выбранный период");
            closeModal();
            return;
        }
        
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, currentExportType === 'bads' ? 'БАДы' : 'Тренировки');
        XLSX.writeFile(wb, `${currentExportType}_${startDate || 'все'}_${endDate || 'все'}.xlsx`);
        closeModal();
    }

    // === ОБЩИЕ ФУНКЦИИ ===
    function showModal(html) {
        let modal = document.getElementById('dynamicModal');
        if(!modal) {
            modal = document.createElement('div');
            modal.id = 'dynamicModal';
            modal.className = 'modal';
            document.body.appendChild(modal);
        }
        modal.innerHTML = html;
        modal.style.display = 'flex';
        modal.onclick = (e) => { if(e.target === modal) closeModal(); };
    }
    
    function closeModal() {
        const modal = document.getElementById('dynamicModal');
        if(modal) modal.style.display = 'none';
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    window.filterBadsHistory = filterBadsHistory;
    window.clearBadsFilter = clearBadsFilter;
    window.openAddSuppModal = openAddSuppModal;
    window.addSupplement = addSupplement;
    window.openConsumeModal = openConsumeModal;
    window.consumeSupp = consumeSupp;
    window.deleteSupplement = deleteSupplement;
    window.openAddWorkoutModal = openAddWorkoutModal;
    window.createEmptyWorkout = createEmptyWorkout;
    window.deleteWorkout = deleteWorkout;
    window.addExerciseToWorkout = addExerciseToWorkout;
    window.saveExerciseToWorkout = saveExerciseToWorkout;
    window.openExportModal = openExportModal;
    window.exportToExcel = exportToExcel;
    window.removeSetField = removeSetField;
    
    loadAll();
    showStart();
</script>
