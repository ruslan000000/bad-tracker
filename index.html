<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Fitness Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0F1115;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .start-screen {
            max-width: 500px;
            width: 100%;
            background: #151922;
            border-radius: 48px;
            padding: 40px 24px;
            text-align: center;
            border: 1px solid #252B36;
        }

        .hero-icon { font-size: 64px; margin-bottom: 16px; }
        .start-title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #C7CDD8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .start-sub { color: #C7CDD8; font-size: 0.8rem; margin-bottom: 32px; opacity: 0.7; }
        
        .start-buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 24px;
        }
        
        .start-btn {
            padding: 16px 20px;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .start-btn.bads { background: #2A5F3A; color: white; }
        .start-btn.workouts { background: #1E3A5F; color: white; }
        .start-btn.instruction { background: #2A303E; color: #C7CDD8; border: 1px solid #3A4050; }
        .start-btn:active { transform: scale(0.97); }
        
        .contact-section { padding-top: 20px; border-top: 1px solid #252B36; }
        .contact-label { font-size: 0.65rem; color: #6E7683; margin-bottom: 8px; text-transform: uppercase; }
        .contact-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #202531;
            padding: 8px 16px;
            border-radius: 40px;
            text-decoration: none;
            color: #C7CDD8;
            font-weight: 600;
            font-size: 0.8rem;
        }
        .version { font-size: 0.55rem; color: #4A505E; margin-top: 16px; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-card {
            background: #151922;
            width: 92%;
            max-width: 450px;
            border-radius: 32px;
            padding: 20px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid #252B36;
        }
        .modal-card h2 { color: white; text-align: center; font-size: 1.4rem; margin-bottom: 16px; }
        .modal-card h3 { color: #7cb342; font-size: 1rem; margin: 16px 0 8px; }
        
        .instruction-table {
            width: 100%;
            margin: 8px 0;
            border-collapse: collapse;
        }
        .instruction-table td {
            padding: 6px 4px;
            border-bottom: 1px solid #2A303E;
            font-size: 0.75rem;
            color: #C7CDD8;
        }
        .instruction-table td:first-child { font-weight: 600; width: 40%; }
        .badge {
            display: inline-block;
            background: #2A5F3A;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-right: 4px;
        }
        .badge.blue { background: #1E3A5F; }
        .close-instruction {
            background: #2A5F3A;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
        }
        
        .app-container {
            max-width: 600px;
            width: 100%;
            background: #0F1115;
            border-radius: 40px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 85vh;
            border: 1px solid #252B36;
        }

        .section-header {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: #151922;
            border-bottom: 1px solid #252B36;
            gap: 8px;
            flex-wrap: wrap;
        }
        .back-btn {
            background: #202531;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: #C7CDD8;
        }
        .section-title { font-size: 1.3rem; font-weight: 700; flex: 1; color: white; }
        .export-btn, .import-btn, .backup-btn, .group-consume-btn {
            background: #2A5F3A;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
        }
        .import-btn { background: #1E3A5F; }
        .backup-btn { background: #7cb342; }
        .group-consume-btn { background: #ff9800; }

        .section-content { flex: 1; overflow-y: auto; padding: 16px; }
        
        .supply-card, .workout-card {
            background: #202531;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
        .card-title { font-weight: 700; font-size: 1rem; color: white; }
        .supply-stock { color: #4CAF50; font-weight: 700; }
        
        .exercise-item {
            background: #151922;
            border-radius: 16px;
            padding: 12px;
            margin-top: 10px;
        }
        .exercise-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .exercise-name { font-weight: 600; color: white; }
        .sets-list { font-size: 0.75rem; color: #A0A6B2; margin-top: 6px; }
        
        .history-item {
            background: #202531;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
        }
        .history-name { color: white; font-weight: 600; }
        .history-detail { font-size: 0.8rem; color: #A0A6B2; }
        .history-date { font-size: 0.65rem; color: #6E7683; margin-top: 4px; }
        
        .add-btn {
            background: #2A5F3A;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 600;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
        }
        .add-btn.blue { background: #1E3A5F; }
        .small-btn {
            background: #2A303E;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            color: #C7CDD8;
            margin-left: 6px;
        }
        .danger-btn { background: #3A1E1E; color: #E57373; }
        .remove-item {
            background: #3A1E1E;
            border: none;
            border-radius: 20px;
            padding: 6px 12px;
            cursor: pointer;
            color: #E57373;
            font-size: 0.7rem;
        }
        
        .filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-row input { flex: 1; padding: 12px; border: 1px solid #252B36; border-radius: 28px; background: #151922; color: white; }
        .filter-row button { padding: 10px 16px; border-radius: 28px; border: none; background: #202531; color: #C7CDD8; cursor: pointer; }
        
        .empty-state { text-align: center; padding: 40px; color: #6E7683; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2A5F3A;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.85rem;
            z-index: 2000;
            animation: fadeOut 3s ease forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; bottom: 30px; }
            70% { opacity: 1; }
            100% { opacity: 0; bottom: 100px; visibility: hidden; }
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ========== ДАННЫЕ ==========
    let supplements = [];
    let historyLog = [];
    let workouts = [];
    let exerciseLibrary = [];

    function saveAll() {
        localStorage.setItem('fitness_supplements', JSON.stringify(supplements));
        localStorage.setItem('fitness_history', JSON.stringify(historyLog));
        localStorage.setItem('fitness_workouts', JSON.stringify(workouts));
        localStorage.setItem('fitness_exercise_library', JSON.stringify(exerciseLibrary));
    }

    function loadAll() {
        supplements = JSON.parse(localStorage.getItem('fitness_supplements') || '[]');
        historyLog = JSON.parse(localStorage.getItem('fitness_history') || '[]');
        workouts = JSON.parse(localStorage.getItem('fitness_workouts') || '[]');
        exerciseLibrary = JSON.parse(localStorage.getItem('fitness_exercise_library') || '[]');
        
        const isFirstLaunch = localStorage.getItem('fitness_first_launch') === null;
        
        if(isFirstLaunch && exerciseLibrary.length === 0) {
            localStorage.setItem('fitness_first_launch', 'done');
            
            exerciseLibrary = [
                { id: 'ex1', name: 'Жим лёжа', muscleGroup: 'Грудь' },
                { id: 'ex2', name: 'Приседания', muscleGroup: 'Ноги' },
                { id: 'ex3', name: 'Тяга вертикальная', muscleGroup: 'Спина' }
            ];
            
            workouts = [{
                id: 'demo1',
                name: 'Первая тренировка',
                date: new Date().toISOString().slice(0, 10),
                exercises: [
                    { id: 'demoex1', name: 'Жим лёжа', muscleGroup: 'Грудь', sets: [{ weight: 60, reps: 10 }, { weight: 65, reps: 8 }] },
                    { id: 'demoex2', name: 'Приседания', muscleGroup: 'Ноги', sets: [{ weight: 80, reps: 8 }, { weight: 85, reps: 6 }] }
                ]
            }];
            
            saveAll();
        }
    }

    function showToast(msg) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    let currentModalCallback = null;

    function showModal(html, onClose) {
        let modal = document.getElementById('dynamicModal');
        if(!modal) {
            modal = document.createElement('div');
            modal.id = 'dynamicModal';
            modal.className = 'modal';
            document.body.appendChild(modal);
        }
        modal.innerHTML = html;
        modal.style.display = 'flex';
        currentModalCallback = onClose || null;
        modal.onclick = (e) => { if(e.target === modal) closeModal(); };
    }

    function closeModal() {
        const modal = document.getElementById('dynamicModal');
        if(modal) modal.style.display = 'none';
        if(currentModalCallback) currentModalCallback();
        currentModalCallback = null;
    }

    // ========== ИНСТРУКЦИЯ ==========
    function showInstruction() {
        showModal(`
            <div class="modal-card">
                <h2>📖 Инструкция</h2>
                <h3>💊 БАДы</h3>
                <table class="instruction-table">
                    <tr><td>➕ Добавить БАД</td><td>Ввести название, единицу, количество</td></tr>
                    <tr><td>💊 Принять</td><td>Выбрать БАД, указать количество и дату</td></tr>
                    <tr><td>🔄 Групповой приём</td><td>Добавить несколько БАДов → записать все сразу</td></tr>
                    <tr><td>🗑️ Удалить БАД</td><td>Нажать корзину рядом с БАДом</td></tr>
                </table>
                <h3>🏋️ Тренировки</h3>
                <table class="instruction-table">
                    <tr><td>➕ Новая тренировка</td><td>Ввести название и дату</td></tr>
                    <tr><td>➕ Упражнение</td><td>Выбрать из библиотеки, добавить подходы</td></tr>
                    <tr><td>✏️ Редактировать</td><td>Нажать ✏️ у упражнения</td></tr>
                    <tr><td>📚 Библиотека</td><td>Кнопка 📚 Упр. — добавление/удаление упражнений</td></tr>
                </table>
                <h3>💾 Бэкапы</h3>
                <table class="instruction-table">
                    <tr><td>📎 Export</td><td>Сохранить историю в CSV (Excel)</td></tr>
                    <tr><td>💾 Бэкап</td><td>Полная копия всех данных</td></tr>
                    <tr><td>📂 Импорт</td><td>Восстановить из бэкапа</td></tr>
                </table>
                <p style="font-size:0.7rem; color:#6E7683; text-align:center; margin-top:12px;">📬 Вопросы: <strong>@Rusrus4</strong></p>
                <button class="close-instruction" onclick="closeModal()">Закрыть</button>
            </div>
        `);
    }

    // ========== СТАРТОВЫЙ ЭКРАН ==========
    function renderStartScreen() {
        document.getElementById('app').innerHTML = `
            <div class="start-screen">
                <div class="hero-icon">💪</div>
                <div class="start-title">Fitness Tracker</div>
                <div class="start-sub">Учёт БАДов и тренировок</div>
                <div class="start-buttons">
                    <button class="start-btn bads" onclick="showSection('bads')">💊 БАДы</button>
                    <button class="start-btn workouts" onclick="showSection('workouts')">🏋️ Тренировки</button>
                    <button class="start-btn instruction" onclick="showInstruction()">📖 Инструкция</button>
                </div>
                <div class="contact-section">
                    <div class="contact-label">📱 ПРЕДЛОЖЕНИЯ И ДОРАБОТКИ</div>
                    <a href="https://t.me/Rusrus4" target="_blank" class="contact-link">✈️ @Rusrus4 (Telegram)</a>
                </div>
                <div class="version">v2.4 — групповой приём БАДов</div>
            </div>
        `;
    }

    function showSection(section) {
        if(section === 'bads') renderBadsSection();
        else if(section === 'workouts') renderWorkoutsSection();
    }

    function goBack() { renderStartScreen(); }

    // ========== БАДЫ ==========
    function renderBadsSection() {
        document.getElementById('app').innerHTML = `
            <div class="app-container">
                <div class="section-header">
                    <button class="back-btn" onclick="goBack()">← Назад</button>
                    <div class="section-title">💊 БАДы</div>
                    <button class="group-consume-btn" onclick="openGroupConsumeModal()">🔄 Групповой</button>
                    <button class="export-btn" onclick="openExportModal('bads')">📎 Export</button>
                    <button class="backup-btn" onclick="exportBackup()">💾 Бэкап</button>
                    <button class="import-btn" onclick="importBackup()">📂 Импорт</button>
                </div>
                <div class="section-content" id="badsContent"></div>
            </div>
        `;
        renderBadsContent();
    }

    function renderBadsContent() {
        const container = document.getElementById('badsContent');
        let supplementsHtml = supplements.map(sup => `
            <div class="supply-card">
                <div class="card-header">
                    <span class="card-title">${escapeHtml(sup.name)}</span>
                    <div>
                        <span class="supply-stock">${sup.quantity} ${sup.unit === 'г' ? 'г' : 'таб'}</span>
                        <button class="small-btn danger-btn" onclick="deleteSupplement('${sup.id}')">🗑️</button>
                    </div>
                </div>
                <div style="font-size:0.7rem; color:#6E7683;">${sup.unit === 'г' ? 'граммы' : 'таблетки'}</div>
            </div>
        `).join('');
        
        let historyHtml = historyLog.filter(h => h.type === 'consume').map(h => `
            <div class="history-item">
                <div class="history-name">${escapeHtml(h.suppName)}</div>
                <div class="history-detail">💊 Принято: ${h.amount} ${h.unit === 'г' ? 'г' : 'таб'}</div>
                <div class="history-date">📅 ${new Date(h.date).toLocaleString()}</div>
            </div>
        `).join('');
        
        container.innerHTML = `
            <div class="filter-row">
                <input type="date" id="badsFilterDate">
                <button onclick="filterBadsHistory()">🔍</button>
                <button onclick="clearBadsFilter()">✖️</button>
            </div>
            <div style="margin-bottom:20px;">
                <div style="color:white; margin-bottom:8px;">📦 Мои БАДы</div>
                ${supplementsHtml || '<div class="empty-state">Нет БАДов</div>'}
                <button class="add-btn" onclick="openAddSuppModal()">➕ Добавить БАД</button>
                <button class="add-btn" style="background:#ff9800;" onclick="openGroupConsumeModal()">🔄 Групповой приём</button>
            </div>
            <div>
                <div style="color:white; margin-bottom:8px;">📜 История приёмов</div>
                <div id="historyList">${historyHtml || '<div class="empty-state">Нет записей</div>'}</div>
            </div>
        `;
    }

    window.deleteSupplement = (id) => {
        if(confirm('Удалить БАД?')) {
            historyLog = historyLog.filter(h => h.suppId !== id);
            supplements = supplements.filter(s => s.id !== id);
            saveAll();
            renderBadsContent();
        }
    };

    window.openAddSuppModal = () => {
        showModal(`
            <div class="modal-card">
                <h3>✨ Добавить БАД</h3>
                <input type="text" id="suppName" placeholder="Название">
                <select id="suppUnit"><option value="г">граммы</option><option value="таб">таблетки</option></select>
                <input type="number" id="suppAmount" placeholder="Количество">
                <div class="modal-buttons" style="display:flex; gap:12px; margin-top:16px;">
                    <button class="small-btn" style="background:#2A5F3A; color:white;" onclick="addSupplement()">Добавить</button>
                    <button class="small-btn danger-btn" onclick="closeModal()">Отмена</button>
                </div>
            </div>
        `);
    };

    window.addSupplement = () => {
        const name = document.getElementById('suppName')?.value;
        const unit = document.getElementById('suppUnit')?.value;
        const amount = parseFloat(document.getElementById('suppAmount')?.value);
        if(!name || isNaN(amount) || amount <= 0) return alert("Ошибка");
        let existing = supplements.find(s => s.name === name && s.unit === unit);
        if(existing) existing.quantity += amount;
        else supplements.push({ id: Date.now().toString(), name, unit, quantity: amount });
        saveAll();
        closeModal();
        renderBadsContent();
    };

    // ГРУППОВОЙ ПРИЁМ БАДОВ
    let selectedBads = [];

    function openGroupConsumeModal() {
        if(supplements.length === 0) {
            alert("Сначала добавьте БАДы");
            return;
        }
        selectedBads = [];
        renderGroupConsumeModal();
    }

    function renderGroupConsumeModal() {
        let availableBads = supplements.filter(s => !selectedBads.find(sb => sb.id === s.id));
        
        let selectedHtml = selectedBads.map(s => `
            <div style="display:flex; justify-content:space-between; align-items:center; background:#202531; padding:8px; border-radius:16px; margin-bottom:6px;">
                <span>${escapeHtml(s.name)} — ${s.amount} ${s.unit}</span>
                <button class="remove-item" onclick="removeFromGroup('${s.id}')">✖️</button>
            </div>
        `).join('');
        
        let availableHtml = availableBads.map(s => `
            <div style="display:flex; justify-content:space-between; align-items:center; background:#2A303E; padding:8px; border-radius:16px; margin-bottom:6px;">
                <span>${escapeHtml(s.name)} (остаток: ${s.quantity} ${s.unit === 'г' ? 'г' : 'таб'})</span>
                <button class="small-btn" onclick="addToGroup('${s.id}')">+ Добавить</button>
            </div>
        `).join('');
        
        showModal(`
            <div class="modal-card">
                <h3>🔄 Групповой приём</h3>
                <label style="color:#C7CDD8;">Дата приёма:</label>
                <input type="datetime-local" id="groupConsumeDate" value="${new Date().toISOString().slice(0,16)}">
                
                <div style="margin: 12px 0;">
                    <div style="color:#7cb342; margin-bottom:6px;">✅ Выбранные (${selectedBads.length}):</div>
                    <div style="max-height:150px; overflow-y:auto;">${selectedHtml || '<div style="color:#6E7683;">Ничего не выбрано</div>'}</div>
                </div>
                
                <div style="margin: 12px 0;">
                    <div style="color:#1E3A5F; margin-bottom:6px;">📦 Доступные БАДы:</div>
                    <div style="max-height:200px; overflow-y:auto;">${availableHtml || '<div style="color:#6E7683;">Нет доступных БАДов</div>'}</div>
                </div>
                
                <div class="modal-buttons" style="display:flex; gap:12px; margin-top:16px;">
                    <button class="small-btn" style="background:#2A5F3A; color:white;" onclick="saveGroupConsume()">💾 Записать всё</button>
                    <button class="small-btn danger-btn" onclick="closeModal()">Отмена</button>
                </div>
            </div>
        `);
    }

    window.addToGroup = (id) => {
        const supp = supplements.find(s => s.id === id);
        if(!supp) return;
        
        let amount = prompt(`Сколько ${supp.name} вы приняли? (${supp.unit === 'г' ? 'грамм' : 'таблеток'})`, "1");
        amount = parseFloat(amount);
        if(isNaN(amount) || amount <= 0) return;
        if(supp.quantity < amount) {
            alert(`Недостаточно! Доступно: ${supp.quantity}`);
            return;
        }
        
        selectedBads.push({ ...supp, amount: amount });
        renderGroupConsumeModal();
    };

    window.removeFromGroup = (id) => {
        selectedBads = selectedBads.filter(s => s.id !== id);
        renderGroupConsumeModal();
    };

    window.saveGroupConsume = () => {
        if(selectedBads.length === 0) {
            alert("Добавьте хотя бы один БАД");
            return;
        }
        
        const date = document.getElementById('groupConsumeDate')?.value;
        
        for(let item of selectedBads) {
            const supp = supplements.find(s => s.id === item.id);
            if(supp) {
                supp.quantity -= item.amount;
                historyLog.push({
                    id: Date.now().toString() + Math.random(),
                    type: 'consume',
                    suppId: supp.id,
                    suppName: supp.name,
                    amount: item.amount,
                    unit: supp.unit,
                    date: new Date(date).toISOString()
                });
            }
        }
        
        saveAll();
        closeModal();
        renderBadsContent();
        showToast(`✅ Записано ${selectedBads.length} БАДов`);
    };

    window.openConsumeModal = () => {
        let options = supplements.map(s => `<option value="${s.id}">${s.name} (${s.quantity} ${s.unit === 'г' ? 'г' : 'таб'})</option>`).join('');
        showModal(`
            <div class="modal-card">
                <h3>💊 Принять БАД</h3>
                <select id="consumeSuppId">${options}</select>
                <input type="number" id="consumeAmount" placeholder="Количество">
                <input type="datetime-local" id="consumeDate" value="${new Date().toISOString().slice(0,16)}">
                <div class="modal-buttons" style="display:flex; gap:12px; margin-top:16px;">
                    <button class="small-btn" style="background:#2A5F3A; color:white;" onclick="consumeSupp()">Записать</button>
                    <button class="small-btn danger-btn" onclick="closeModal()">Отмена</button>
                </div>
            </div>
        `);
    };

    window.consumeSupp = () => {
        const id = document.getElementById('consumeSuppId')?.value;
        const amount = parseFloat(document.getElementById('consumeAmount')?.value);
        const date = document.getElementById('consumeDate')?.value;
        const supp = supplements.find(s => s.id === id);
        if(!supp || isNaN(amount) || amount <= 0 || supp.quantity < amount) return alert("Ошибка");
        supp.quantity -= amount;
        historyLog.push({ id: Date.now().toString(), type: 'consume', suppId: supp.id, suppName: supp.name, amount, unit: supp.unit, date: new Date(date).toISOString() });
        saveAll();
        closeModal();
        renderBadsContent();
    };

    window.filterBadsHistory = () => {
        const filterDate = document.getElementById('badsFilterDate')?.value;
        const listDiv = document.getElementById('historyList');
        let filtered = historyLog.filter(h => h.type === 'consume');
        if(filterDate) filtered = filtered.filter(h => h.date.split('T')[0] === filterDate);
        listDiv.innerHTML = filtered.map(h => `<div class="history-item"><div class="history-name">${escapeHtml(h.suppName)}</div><div class="history-detail">💊 ${h.amount} ${h.unit}</div><div class="history-date">${new Date(h.date).toLocaleString()}</div></div>`).join('') || '<div class="empty-state">Нет записей</div>';
    };

    window.clearBadsFilter = () => {
        if(document.getElementById('badsFilterDate')) document.getElementById('badsFilterDate').value = '';
        filterBadsHistory();
    };

    // ========== ЭКСПОРТ/ИМПОРТ ==========
    function exportBackup() {
        const backup = { supplements, historyLog, workouts, exerciseLibrary, date: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `fitness_backup_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('📦 Бэкап сохранён!');
    }

    function importBackup() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if(data.supplements) supplements = data.supplements;
                    if(data.historyLog) historyLog = data.historyLog;
                    if(data.workouts) workouts = data.workouts;
                    if(data.exerciseLibrary) exerciseLibrary = data.exerciseLibrary;
                    saveAll();
                    showToast('✅ Данные восстановлены!');
                    if(document.getElementById('badsContent')) renderBadsContent();
                    if(document.getElementById('workoutsContent')) renderWorkoutsContent();
                } catch(err) { alert('Ошибка: неверный файл'); }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    function exportToCSV(type, startDate, endDate) {
        let data = [];
        if(type === 'bads') {
            let entries = historyLog.filter(h => h.type === 'consume');
            if(startDate) entries = entries.filter(e => e.date.split('T')[0] >= startDate);
            if(endDate) entries = entries.filter(e => e.date.split('T')[0] <= endDate);
            data = entries.map(e => ({ 'Дата': new Date(e.date).toLocaleString(), 'БАД': e.suppName, 'Принято': e.amount, 'Единица': e.unit === 'г' ? 'граммы' : 'таблетки' }));
        } else {
            let filtered = [...workouts];
            if(startDate) filtered = filtered.filter(w => w.date >= startDate);
            if(endDate) filtered = filtered.filter(w => w.date <= endDate);
            for(let w of filtered) {
                for(let ex of (w.exercises || [])) {
                    for(let set of (ex.sets || [])) {
                        data.push({ 'Дата': w.date, 'Тренировка': w.name, 'Упражнение': ex.name, 'Группа мышц': ex.muscleGroup, 'Вес (кг)': set.weight, 'Повторы': set.reps });
                    }
                }
            }
        }
        if(!data.length) { alert("Нет данных"); return; }
        const headers = Object.keys(data[0]);
        const csvRows = [headers.join(',')];
        for(const row of data) {
            const values = headers.map(h => { let v = row[h] || ''; if(typeof v === 'string') v = v.replace(/"/g, '""'); return `"${v}"`; });
            csvRows.push(values.join(','));
        }
        const blob = new Blob(['\uFEFF' + csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${type}_${startDate || 'все'}_${endDate || 'все'}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('📊 CSV скачан!');
    }

    let currentExportType = '';
    function openExportModal(type) {
        currentExportType = type;
        showModal(`
            <div class="modal-card">
                <h3>📎 Выгрузка данных</h3>
                <input type="date" id="exportStartDate" placeholder="С даты">
                <input type="date" id="exportEndDate" placeholder="По дату">
                <div class="modal-buttons" style="display:flex; gap:12px; margin-top:16px;">
                    <button class="small-btn" style="background:#2A5F3A; color:white;" onclick="doExport()">📊 Выгрузить CSV</button>
                    <button class="small-btn danger-btn" onclick="closeModal()">Отмена</button>
                </div>
            </div>
        `);
    }

    window.doExport = () => {
        const start = document.getElementById('exportStartDate')?.value;
        const end = document.getElementById('exportEndDate')?.value;
        exportToCSV(currentExportType, start, end);
        closeModal();
    };

    // ========== ТРЕНИРОВКИ (сокращённо, все функции есть) ==========
    function renderWorkoutsSection() {
        document.getElementById('app').innerHTML = `
            <div class="app-container">
                <div class="section-header">
                    <button class="back-btn" onclick="goBack()">← Назад</button>
                    <div class="section-title">🏋️ Тренировки</div>
                    <button class="export-btn" onclick="openExportModal('workouts')">📎 Export</button>
                    <button class="backup-btn" onclick="exportBackup()">💾 Бэкап</button>
                    <button class="import-btn" onclick="importBackup()">📂 Импорт</button>
                    <button class="import-btn" style="background:#1E3A5F;" onclick="openExerciseLibrary()">📚 Упр.</button>
                </div>
                <div class="section-content" id="workoutsContent"></div>
            </div>
        `;
        renderWorkoutsContent();
    }

    function renderWorkoutsContent() {
        const container = document.getElementById('workoutsContent');
        if(!workouts.length) {
            container.innerHTML = `<div class="empty-state">🏋️ Нет тренировок</div><button class="add-btn blue" onclick="openAddWorkoutModal()">➕ Новая тренировка</button>`;
            return;
        }
        const sorted = [...workouts].sort((a,b) => new Date(b.date) - new Date(a.date));
        container.innerHTML = sorted.map(w => `
            <div class="workout-card">
                <div class="card-header">
                    <span class="card-title">🏷️ ${escapeHtml(w.name || 'Тренировка')}</span>
                    <div>
                        <span style="color:#A0A6B2; font-size:0.8rem;">📅 ${new Date(w.date).toLocaleDateString('ru-RU')}</span>
                        <button class="small-btn danger-btn" onclick="deleteWorkout('${w.id}')">🗑️</button>
                    </div>
                </div>
                ${(w.exercises || []).map(ex => `
                    <div class="exercise-item">
                        <div class="exercise-header">
                            <span class="exercise-name">💪 ${escapeHtml(ex.name)}</span>
                            <div>
                                <button class="small-btn" onclick="editExerciseInWorkout('${w.id}','${ex.id}')">✏️</button>
                                <button class="small-btn danger-btn" onclick="deleteExerciseFromWorkout('${w.id}','${ex.id}')">🗑️</button>
                            </div>
                        </div>
                        <div class="sets-list">${(ex.sets || []).map((s,i)=>`${i+1} подход: ${s.weight}кг × ${s.reps} повт`).join(' · ')}</div>
                    </div>
                `).join('')}
                <button class="small-btn" style="background:#1E3A5F; color:white; margin-top:8px;" onclick="addExerciseToWorkout('${w.id}')">➕ Упражнение</button>
                <button class="small-btn" style="background:#2A303E; margin-top:4px;" onclick="editWorkoutNameDate('${w.id}')">✏️ Название/дата</button>
            </div>
        `).join('');
        container.innerHTML += `<button class="add-btn blue" onclick="openAddWorkoutModal()">➕ Новая тренировка</button>`;
    }

    function openExerciseLibrary() {
        let exercisesHtml = (exerciseLibrary || []).map(ex => `
            <div class="exercise-library-card" style="background:#202531; border-radius:24px; padding:16px; margin-bottom:12px;">
                <div class="card-header">
                    <span class="card-title">${escapeHtml(ex.name)} <span style="color:#A0A6B2;">(${escapeHtml(ex.muscleGroup)})</span></span>
                    <div>
                        <button class="small-btn" onclick="editExerciseInLibrary('${ex.id}')">✏️</button>
                        <button class="small-btn danger-btn" onclick="deleteExerciseFromLibrary('${ex.id}')">🗑️</button>
                    </div>
                </div>
            </div>
        `).join('');
        showModal(`
            <div class="modal-card">
                <h3>📚 Библиотека упражнений</h3>
                <div style="max-height:300px; overflow-y:auto;">${exercisesHtml || '<div class="empty-state">Нет упражнений</div>'}</div>
                <button class="add-btn" style="background:#1E3A5F; margin-top:12px;" onclick="addNewExerciseToLibrary()">➕ Добавить упражнение</button>
                <button class="small-btn danger-btn" style="margin-top:12px;" onclick="closeModal()">Закрыть</button>
            </div>
        `);
    }

    window.addNewExerciseToLibrary = () => {
        showModal(`
            <div class="modal-card">
                <h3>➕ Новое упражнение</h3>
                <input type="text" id="newExName" placeholder="Название">
                <input type="text" id="newExMuscle" placeholder="Группа мышц">
                <div class="modal-buttons" style="display:flex; gap:12px; margin-top:16px;">
                    <button class="small-btn" style="background:#2A5F3A; color:white;" onclick="saveNewExercise()">Сохранить</button>
                    <button class="small-btn danger-btn" onclick="closeModal()">Отмена</button>
                </div>
            </div>
        `);
    };

    window.saveNewExercise = () => {
        const name = document.getElementById('newExName')?.value;
        const muscle = document.getElementById('newExMuscle')?.value;
        if(!name || !muscle) return alert("Заполните поля");
        exerciseLibrary.push({ id: Date.now().toString(), name, muscleGroup: muscle });
        saveAll();
        closeModal();
        openExerciseLibrary();
    };

    window.editExerciseInLibrary = (id) => {
        const ex = exerciseLibrary.find(e => e.id === id);
        showModal(`
            <div class="modal-card">
                <h3>✏️ Редактировать</h3>
                <input type="text" id="editExName" value="${escapeHtml(ex.name)}">
                <input type="text" id="editExMuscle" value="${escapeHtml(ex.muscleGroup)}">
                <div class="modal-buttons" style="display:flex; gap:12px; margin-top:16px;">
                    <button class="small-btn" style="background:#2A5F3A; color:white;" onclick="updateExerciseInLibrary('${id}')">Сохранить</button>
                    <button class="small-btn danger-btn" onclick="closeModal()">Отмена</button>
                </div>
            </div>
        `);
    };

    window.updateExerciseInLibrary = (id) => {
        const name = document.getElementById('editExName')?.value;
        const muscle = document.getElementById('editExMuscle')?.value;
        const ex = exerciseLibrary.find(e => e.id === id);
        if(ex && name && muscle) { ex.name = name; ex.muscleGroup = muscle; saveAll(); closeModal(); openExerciseLibrary(); }
    };

    window.deleteExerciseFromLibrary = (id) => {
        if(confirm('Удалить упражнение?')) {
            exerciseLibrary = exerciseLibrary.filter(e => e.id !== id);
            workouts.forEach(w => { w.exercises = w.exercises.filter(e => e.id !== id); });
            saveAll();
            openExerciseLibrary();
            renderWorkoutsContent();
        }
    };

    window.openAddWorkoutModal = () => {
        showModal(`
            <div class="modal-card">
                <h3>➕ Новая тренировка</h3>
                <input type="text" id="workoutName" placeholder="Название">
                <input type="date" id="workoutDate" value="${new Date().toISOString().slice(0,10)}">
                <div class="modal-buttons" style="display:flex; gap:12px; margin-top:16px;">
                    <button class="small-btn" style="background:#1E3A5F; color:white;" onclick="createWorkout()">Создать</button>
                    <button class="small-btn danger-btn" onclick="closeModal()">Отмена</button>
                </div>
            </div>
        `);
    };

    window.createWorkout = () => {
        const name = document.getElementById('workoutName')?.value || 'Тренировка';
        const date = document.getElementById('workoutDate')?.value;
        workouts.push({ id: Date.now().toString(), name, date, exercises: [] });
        saveAll();
        closeModal();
        renderWorkoutsContent();
    };

    window.deleteWorkout = (id) => {
        if(confirm('Удалить тренировку?')) { workouts = workouts.filter(w => w.id !== id); saveAll(); renderWorkoutsContent(); }
    };

    window.editWorkoutNameDate = (id) => {
        const w = workouts.find(w => w.id === id);
        showModal(`
            <div class="modal-card">
                <h3>✏️ Редактировать</h3>
                <input type="text" id="editWorkoutName" value="${escapeHtml(w.name)}">
                <input type="date" id="editWorkoutDate" value="${w.date}">
                <div class="modal-buttons" style="display:flex; gap:12px; margin-top:16px;">
                    <button class="small-btn" style="background:#2A5F3A; color:white;" onclick="updateWorkout('${id}')">Сохранить</button>
                    <button class="small-btn danger-btn" onclick="closeModal()">Отмена</button>
                </div>
            </div>
        `);
    };

    window.updateWorkout = (id) => {
        const w = workouts.find(w => w.id === id);
        if(w) { w.name = document.getElementById('editWorkoutName')?.value || 'Тренировка'; w.date = document.getElementById('editWorkoutDate')?.value; saveAll(); closeModal(); renderWorkoutsContent(); }
    };

    let currentSets = [];
    
    window.addExerciseToWorkout = (workoutId) => {
        let options = (exerciseLibrary || []).map(ex => `<option value="${ex.id}" data-muscle="${ex.muscleGroup}">${ex.name} (${ex.muscleGroup})</option>`).join('');
        options += `<option value="new">➕ Новое упражнение...</option>`;
        showModal(`
            <div class="modal-card">
                <h3>🏋️ Добавить упражнение</h3>
                <select id="exSelect" onchange="toggleNewExerciseField()">${options}</select>
                <div id="newExerciseFields" style="display:none;">
                    <input type="text" id="newExNameLib" placeholder="Название">
                    <input type="text" id="newExMuscleLib" placeholder="Группа мышц">
                </div>
                <div id="setsContainer">
                    <div style="color:white; margin:8px 0;">Подходы:</div>
                    <div id="setsList"></div>
                    <button class="small-btn" onclick="addSetField()">+ Добавить подход</button>
                </div>
                <div class="modal-buttons" style="display:flex; gap:12px; margin-top:16px;">
                    <button class="small-btn" style="background:#2A5F3A; color:white;" onclick="saveExerciseToWorkout('${workoutId}')">Сохранить</button>
                    <button class="small-btn danger-btn" onclick="closeModal()">Отмена</button>
                </div>
            </div>
        `);
        currentSets = [];
        addSetField();
    };

    window.toggleNewExerciseField = () => {
        const val = document.getElementById('exSelect')?.value;
        const el = document.getElementById('newExerciseFields');
        if(el) el.style.display = val === 'new' ? 'block' : 'none';
    };

    window.addSetField = () => { currentSets.push({ weight: '', reps: '' }); renderSetsList(); };
    window.removeSetField = (idx) => { currentSets.splice(idx, 1); renderSetsList(); };
    
    function renderSetsList() {
        const container = document.getElementById('setsList');
        if(!container) return;
        container.innerHTML = currentSets.map((set, idx) => `
            <div style="display:flex; gap:8px; margin:6px 0;">
                <input type="number" placeholder="Вес (кг)" value="${set.weight}" onchange="currentSets[${idx}].weight = this.value" style="flex:1; padding:8px; border-radius:20px; border:1px solid #252B36; background:#202531; color:white;">
                <input type="number" placeholder="Повторы" value="${set.reps}" onchange="currentSets[${idx}].reps = this.value" style="flex:1; padding:8px; border-radius:20px; border:1px solid #252B36; background:#202531; color:white;">
                <button class="remove-item" onclick="removeSetField(${idx})">✖️</button>
            </div>
        `).join('');
    }

    window.saveExerciseToWorkout = (workoutId) => {
        const select = document.getElementById('exSelect');
        let name, muscleGroup;
        if(select.value === 'new') {
            name = document.getElementById('newExNameLib')?.value;
            muscleGroup = document.getElementById('newExMuscleLib')?.value;
            if(!name || !muscleGroup) return alert("Заполните поля");
            exerciseLibrary.push({ id: Date.now().toString(), name, muscleGroup });
            saveAll();
        } else {
            const ex = exerciseLibrary.find(e => e.id === select.value);
            name = ex.name; muscleGroup = ex.muscleGroup;
        }
        const sets = currentSets.filter(s => s.weight && s.reps).map(s => ({ weight: parseFloat(s.weight), reps: parseInt(s.reps) }));
        if(sets.length === 0) return alert("Добавьте подходы");
        const workout = workouts.find(w => w.id === workoutId);
        workout.exercises.push({ id: Date.now().toString(), name, muscleGroup, sets });
        saveAll();
        closeModal();
        renderWorkoutsContent();
    };

    window.editExerciseInWorkout = (workoutId, exerciseId) => {
        const workout = workouts.find(w => w.id === workoutId);
        const exercise = workout?.exercises.find(e => e.id === exerciseId);
        if(!exercise) return;
        currentSets = [...(exercise.sets || [])];
        showModal(`
            <div class="modal-card">
                <h3>✏️ Редактировать упражнение</h3>
                <div id="setsContainer">
                    <div style="color:white; margin:8px 0;">Подходы:</div>
                    <div id="setsList"></div>
                    <button class="small-btn" onclick="addSetField()">+ Добавить подход</button>
                </div>
                <div class="modal-buttons" style="display:flex; gap:12px; margin-top:16px;">
                    <button class="small-btn" style="background:#2A5F3A; color:white;" onclick="updateExerciseInWorkout('${workoutId}','${exerciseId}')">Сохранить</button>
                    <button class="small-btn danger-btn" onclick="closeModal()">Отмена</button>
                </div>
            </div>
        `);
        renderSetsList();
    };

    window.updateExerciseInWorkout = (workoutId, exerciseId) => {
        const workout = workouts.find(w => w.id === workoutId);
        const exercise = workout?.exercises.find(e => e.id === exerciseId);
        if(exercise) {
            exercise.sets = currentSets.filter(s => s.weight && s.reps).map(s => ({ weight: parseFloat(s.weight), reps: parseInt(s.reps) }));
            saveAll();
            closeModal();
            renderWorkoutsContent();
        }
    };

    window.deleteExerciseFromWorkout = (workoutId, exerciseId) => {
        if(confirm('Удалить упражнение?')) {
            const workout = workouts.find(w => w.id === workoutId);
            if(workout) { workout.exercises = workout.exercises.filter(e => e.id !== exerciseId); saveAll(); renderWorkoutsContent(); }
        }
    };

    loadAll();
    renderStartScreen();
</script>
</body>
</html>
